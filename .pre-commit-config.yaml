repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Frontend assets + docs: prettier on JS/JSON/CSS/HTML/MD.
  # Rust code goes through cargo fmt below.
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: \.(js|jsx|ts|tsx|json|css|html|md)$
        exclude: ^(node_modules/|dist/|target/|gen/|Cargo\.lock$)

  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt -- --check
        language: system
        types: [rust]
        pass_filenames: false

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy -- -D warnings
        language: system
        types: [rust]
        pass_filenames: false

      - id: block-claude-attribution
        name: Block Claude Attribution
        entry: bash .pre-commit-hooks/block-claude-attribution.sh
        language: system
        stages: [commit-msg]

ci:
  autofix_prs: true
  autofix_commit_msg: 'chore: pre-commit auto fixes'
